<div class="card p-5">
    <div class="flex justify-between items-center relative">
        <div class="card-title">
            <h3 class="text-xl font-bold leading-none">Projects</h3>
        </div>
        <div class="absolute right-0">
            <input type="text" placeholder="Search..." [(ngModel)]="searchText" (input)="filterTable()"
                class="search-input border border-gray-300 rounded-md px-2 py-1 focus:outline-none">
        </div>
    </div>
    <div class="data-table mt-3">
        <div class="table-container ct_custom_table overflow-x-auto">
            <table class="divide-y divide-gray-200 min-w-full ">
                <thead class="bg-gray-50 sticky top-0">
                    <tr>
                        <th>S No.</th>
                        <th>Project</th>
                        <th>Deployed</th>
                        <th>Created On</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">

                    <!-- No Data -->
                    <tr *ngIf="filteredData?.length == 0">
                        <td colspan="20" class="text-center py-6 text-gray-500">
                            No project found
                        </td>
                    </tr>
                    <!-- Data Row -->
                    <ng-container *ngFor="let item of filteredData; let i = index">
                        <!-- Main Row -->
                        <tr>
                            <td class="text-center">{{i+1}}</td>
                            <td class="text-center">{{item.clientProjectName || '-'}}</td>
                            <td class="text-center">{{item.deployed ? 'Yes' : 'No'}}</td>
                            <td class="text-center">{{(item.createdAt | date) || '-'}}</td>
                            <td class="text-center">
                                @if(item.projectStatus == '0'){
                                <span class="px-2 py-1 text-xs bg-yellow-100 text-yellow-700 rounded-full">Draft</span>
                                } @else {
                                <span
                                    class="px-2 py-1 text-xs bg-green-100 text-green-700 rounded-full">Completed</span>
                                }
                            </td>

                            <td class="text-center">
                                <a routerLink="/admin/project-details/{{item.id}}"
                                    class="border border-[#1b83c1] rounded text-xs px-1 text-[#1b83c1] cursor-pointer"
                                    title="View Details">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                    </ng-container>
                </tbody>
            </table>
        </div>
    </div>
</div>
